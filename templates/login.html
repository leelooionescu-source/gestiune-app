{% extends "base.html" %}
{% block title %}Autentificare{% endblock %}
{% block content %}
<div class="login-container">
    <div class="card shadow">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-briefcase-fill text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-2">Gestiune</h3>
                <p class="text-muted">Aplicatie de gestiune clienti</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Utilizator</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Parola</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Autentificare
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

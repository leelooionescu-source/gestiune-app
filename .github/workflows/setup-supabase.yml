name: Setup Supabase Database

on:
  push:
    paths: ['.github/workflows/setup-supabase.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      PGPASSWORD: Wwxx7pQ2yo4c3FLO
      PROJECT_REF: vfxocdnquxhrhkjzemzf
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/analyze-test-coverage-0UYsC

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Find working connection
        id: conn
        run: |
          CONN1="postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require"
          CONN2="postgresql://postgres:${PGPASSWORD}@db.${PROJECT_REF}.supabase.co:5432/postgres?sslmode=require"
          CONN3="postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require"

          if psql "$CONN1" -c "SELECT 1;" > /dev/null 2>&1; then
            echo "conn=$CONN1" >> $GITHUB_OUTPUT
            echo "Connected via session pooler"
          elif psql "$CONN2" -c "SELECT 1;" > /dev/null 2>&1; then
            echo "conn=$CONN2" >> $GITHUB_OUTPUT
            echo "Connected via direct"
          elif psql "$CONN3" -c "SELECT 1;" > /dev/null 2>&1; then
            echo "conn=$CONN3" >> $GITHUB_OUTPUT
            echo "Connected via transaction pooler"
          else
            echo "ALL CONNECTIONS FAILED"
            psql "$CONN1" -c "SELECT 1;" 2>&1 || true
            psql "$CONN2" -c "SELECT 1;" 2>&1 || true
            exit 1
          fi

      - name: Run database schema
        run: |
          psql "${{ steps.conn.outputs.conn }}" -f supabase/schema.sql
          echo "SCHEMA CREATED"

      - name: Create admin user
        run: |
          psql "${{ steps.conn.outputs.conn }}" -f supabase/setup-admin.sql
          echo "ADMIN CREATED"

      - name: Verify setup
        run: |
          echo "=== Tables ==="
          psql "${{ steps.conn.outputs.conn }}" -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;"
          echo "=== Auth Users ==="
          psql "${{ steps.conn.outputs.conn }}" -c "SELECT id, email FROM auth.users LIMIT 5;"
          echo "=== Utilizatori ==="
          psql "${{ steps.conn.outputs.conn }}" -c "SELECT id, username, nume, is_admin FROM utilizatori;"
          echo "=== ALL DONE ==="

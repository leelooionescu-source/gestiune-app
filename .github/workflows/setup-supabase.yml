name: Setup Supabase Database

on:
  push:
    paths: ['.github/workflows/setup-supabase.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      PGPASSWORD: Wwxx7pQ2yo4c3FLO
      DB_HOST: db.vfxocdnquxhrhkjzemzf.supabase.co
      PGCONNSTR: "host=db.vfxocdnquxhrhkjzemzf.supabase.co port=5432 dbname=postgres user=postgres sslmode=require"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/analyze-test-coverage-0UYsC

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          psql --version

      - name: Test database connection
        run: |
          psql "$PGCONNSTR" -c "SELECT version();"

      - name: Run database schema
        run: |
          psql "$PGCONNSTR" -v ON_ERROR_STOP=0 -f supabase/schema.sql 2>&1
          echo "Schema step done"

      - name: Create admin user
        run: |
          psql "$PGCONNSTR" -v ON_ERROR_STOP=0 -f supabase/setup-admin.sql 2>&1
          echo "Admin step done"

      - name: Verify setup
        run: |
          echo "=== Tables ==="
          psql "$PGCONNSTR" -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;"
          echo "=== Auth Users ==="
          psql "$PGCONNSTR" -c "SELECT id, email FROM auth.users LIMIT 5;"
          echo "=== Utilizatori ==="
          psql "$PGCONNSTR" -c "SELECT * FROM utilizatori;"
          echo "=== SETUP COMPLETE ==="

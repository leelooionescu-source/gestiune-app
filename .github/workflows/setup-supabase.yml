name: Setup Supabase Database

on:
  push:
    paths: ['.github/workflows/setup-supabase.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      PGPASSWORD: Wwxx7pQ2yo4c3FLO
      PROJECT_REF: vfxocdnquxhrhkjzemzf
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/analyze-test-coverage-0UYsC

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          psql --version

      - name: Check Supabase project is alive
        run: |
          echo "=== REST API check ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" "https://${PROJECT_REF}.supabase.co/rest/v1/" -H "apikey: sb_publishable_8fp4YVXfwVoZnxjMH59vnw_nyKAPlkP" || true
          echo ""
          echo "=== DNS for direct ==="
          dig +short db.${PROJECT_REF}.supabase.co || nslookup db.${PROJECT_REF}.supabase.co || true
          echo "=== DNS for pooler ==="
          dig +short aws-0-eu-west-1.pooler.supabase.com || true
          echo "=== Port check direct ==="
          timeout 5 bash -c "echo > /dev/tcp/db.${PROJECT_REF}.supabase.co/5432" 2>&1 && echo "Port 5432 OPEN" || echo "Port 5432 CLOSED/TIMEOUT"
          echo "=== Port check pooler ==="
          timeout 5 bash -c "echo > /dev/tcp/aws-0-eu-west-1.pooler.supabase.com/5432" 2>&1 && echo "Pooler 5432 OPEN" || echo "Pooler 5432 CLOSED"
          timeout 5 bash -c "echo > /dev/tcp/aws-0-eu-west-1.pooler.supabase.com/6543" 2>&1 && echo "Pooler 6543 OPEN" || echo "Pooler 6543 CLOSED"

      - name: Try all connection methods
        run: |
          echo "=== 1. Direct ==="
          psql "postgresql://postgres:${PGPASSWORD}@db.${PROJECT_REF}.supabase.co:5432/postgres?sslmode=require" -c "SELECT 1 as ok;" 2>&1 || echo "FAILED"

          echo "=== 2. Session pooler eu-west-1 ==="
          psql "postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require" -c "SELECT 1 as ok;" 2>&1 || echo "FAILED"

          echo "=== 3. Transaction pooler eu-west-1 ==="
          psql "postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require" -c "SELECT 1 as ok;" 2>&1 || echo "FAILED"

          echo "=== 4. New pooler format ==="
          psql "postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@${PROJECT_REF}.pooler.supabase.com:5432/postgres?sslmode=require" -c "SELECT 1 as ok;" 2>&1 || echo "FAILED"

          echo "=== 5. Pooler eu-west-2 ==="
          psql "postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@aws-0-eu-west-2.pooler.supabase.com:5432/postgres?sslmode=require" -c "SELECT 1 as ok;" 2>&1 || echo "FAILED"

          echo "=== 6. No SSL ==="
          psql "postgresql://postgres:${PGPASSWORD}@db.${PROJECT_REF}.supabase.co:5432/postgres?sslmode=prefer" -c "SELECT 1 as ok;" 2>&1 || echo "FAILED"

      - name: Run schema if connected
        if: success()
        run: echo "Would run schema here if connection worked"

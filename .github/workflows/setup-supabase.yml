name: Setup Supabase Database

on:
  push:
    paths: ['.github/workflows/setup-supabase.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      PGPASSWORD: Wwxx7pQ2yo4c3FLO
      PROJECT_REF: vfxocdnquxhrhkjzemzf
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ github.token }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Run diagnostics and save to file
        run: |
          exec > diagnostics.log 2>&1
          echo "=== TIMESTAMP ==="
          date
          echo ""

          echo "=== PSQL VERSION ==="
          psql --version
          echo ""

          echo "=== REST API CHECK ==="
          curl -s -w "\nHTTP_CODE: %{http_code}\n" "https://${PROJECT_REF}.supabase.co/rest/v1/" -H "apikey: sb_publishable_8fp4YVXfwVoZnxjMH59vnw_nyKAPlkP" || echo "CURL FAILED"
          echo ""

          echo "=== DNS DIRECT ==="
          dig +short db.${PROJECT_REF}.supabase.co 2>&1 || nslookup db.${PROJECT_REF}.supabase.co 2>&1 || echo "DNS FAILED"
          echo ""

          echo "=== DNS POOLER ==="
          dig +short aws-0-eu-west-1.pooler.supabase.com 2>&1 || echo "DNS FAILED"
          echo ""

          echo "=== CONNECTION 1: Session pooler eu-west-1 port 5432 ==="
          psql "postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require" -c "SELECT 1 as test;" 2>&1 || echo "CONN1 FAILED"
          echo ""

          echo "=== CONNECTION 2: Direct port 5432 ==="
          psql "postgresql://postgres:${PGPASSWORD}@db.${PROJECT_REF}.supabase.co:5432/postgres?sslmode=require" -c "SELECT 1 as test;" 2>&1 || echo "CONN2 FAILED"
          echo ""

          echo "=== CONNECTION 3: Transaction pooler port 6543 ==="
          psql "postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require" -c "SELECT 1 as test;" 2>&1 || echo "CONN3 FAILED"
          echo ""

          echo "=== CONNECTION 4: eu-central-1 pooler ==="
          psql "postgresql://postgres.${PROJECT_REF}:${PGPASSWORD}@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" -c "SELECT 1 as test;" 2>&1 || echo "CONN4 FAILED"
          echo ""

          echo "=== CONNECTION 5: Direct no SSL ==="
          psql "postgresql://postgres:${PGPASSWORD}@db.${PROJECT_REF}.supabase.co:5432/postgres" -c "SELECT 1 as test;" 2>&1 || echo "CONN5 FAILED"
          echo ""

          echo "=== PG_ISREADY ==="
          pg_isready -h db.${PROJECT_REF}.supabase.co -p 5432 2>&1 || echo "NOT READY"
          pg_isready -h aws-0-eu-west-1.pooler.supabase.com -p 5432 2>&1 || echo "NOT READY"
          echo ""
          echo "=== DONE ==="

      - name: Show log
        run: cat diagnostics.log

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add diagnostics.log
          git commit -m "Add connection diagnostics log" || true
          git push origin master || true
